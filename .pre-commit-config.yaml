repos:
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.14.3
  hooks:
    # Run the linter.
    - id: ruff-check
      args: [ --fix ]
      exclude: ^tests/
    # Run the formatter.
    - id: ruff-format
      exclude: ^tests/

- repo: https://github.com/pre-commit/mirrors-mypy
  rev: 'v1.18.2'
  hooks:
    - id: mypy
      files: ^src/
      additional_dependencies:
        - sqlmodel
        - pydantic
        - pydantic-settings
        - typer
